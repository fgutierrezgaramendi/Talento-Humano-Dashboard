<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talento Humano · Grupo Chávez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --ink:#15303f; --ink-soft:#5d6b78; --line:#e4e6e3;
  --paper:#f4f5f3; --card:#ffffff; --accent:#0e87bf; --accent-soft:#e1f0f7;
  --orange:#e8621e; --warn:#b4452a; --good:#15795f;
  --shadow:0 1px 2px rgba(21,48,63,.06),0 8px 24px rgba(21,48,63,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Spline Sans',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}

#gate{position:fixed;inset:0;z-index:99;background:var(--paper);display:flex;align-items:center;justify-content:center}
#gate .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:38px 34px;width:min(360px,90vw);box-shadow:var(--shadow);text-align:center}
#gate h2{font-family:'Fraunces',serif;font-weight:500;font-size:1.4rem;margin-bottom:6px}
#gate p{color:var(--ink-soft);font-size:.86rem;margin-bottom:20px}
#gate input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:9px;font-size:.95rem;font-family:inherit;margin-bottom:12px}
#gate input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
#gate button{width:100%;padding:11px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-weight:600;font-size:.92rem;cursor:pointer;font-family:inherit}
#gate .err{color:var(--warn);font-size:.8rem;height:1rem;margin-top:8px}

.wrap{max-width:1280px;margin:0 auto;padding:22px 22px 60px}

.logobar{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap}
.logobar .chip{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;display:flex;align-items:center;height:46px}
.logobar .chip.fc{background:#00a3e0;border-color:#00a3e0}
.logobar img{height:30px;width:auto;display:block}
.logobar .grp{margin-left:auto;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}

header.top{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
.brand .kicker{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.brand h1{font-family:'Fraunces',serif;font-weight:500;font-size:2.05rem;line-height:1.1;margin-top:2px;letter-spacing:-.01em}
.sync{display:flex;align-items:center;gap:14px}
.sync .meta{text-align:right;font-size:.74rem;color:var(--ink-soft);line-height:1.35}
.sync .meta b{color:var(--ink);font-weight:600}
#btnSync{display:flex;align-items:center;gap:7px;background:var(--ink);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-family:inherit;font-weight:600;font-size:.84rem;cursor:pointer;transition:opacity .15s}
#btnSync:hover{opacity:.88}
#btnSync:disabled{opacity:.5;cursor:wait}
#btnSync svg{width:14px;height:14px}
#btnSync.spin svg{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
.tab{background:none;border:none;font-family:inherit;cursor:pointer;padding:10px 16px;font-size:.88rem;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:8px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.kpi .lbl{font-size:.71rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.kpi .val{font-family:'Fraunces',serif;font-size:1.95rem;font-weight:500;margin-top:4px;letter-spacing:-.01em}
.kpi .val small{font-family:'Spline Sans';font-size:.8rem;color:var(--ink-soft);font-weight:500}
.kpi .bar{height:6px;border-radius:4px;background:var(--accent-soft);margin-top:9px;overflow:hidden}
.kpi .bar i{display:block;height:100%;background:var(--accent);border-radius:4px}

.section-t{font-family:'Fraunces',serif;font-weight:500;font-size:1.1rem;margin:24px 0 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px}
.cardc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.cardc.full{grid-column:1/-1}
.cardc h3{font-size:.88rem;font-weight:600;margin-bottom:3px;line-height:1.3}
.cardc .sub{font-size:.73rem;color:var(--ink-soft);margin-bottom:12px}
.chartbox{position:relative;width:100%}

.comments{max-height:330px;overflow:auto;display:flex;flex-direction:column;gap:8px;margin-top:4px}
.comments .q{background:var(--paper);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:9px 12px;font-size:.84rem}

.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:22px 0 12px}
.btn-ghost{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 15px;font-family:inherit;font-weight:600;font-size:.83rem;cursor:pointer;color:var(--ink)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.search{position:relative;flex:1;min-width:200px}
.search input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:.88rem;background:var(--card)}
.search input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-soft)}
.count{font-size:.8rem;color:var(--ink-soft);white-space:nowrap}
.tablebox{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:auto;box-shadow:var(--shadow);max-height:60vh}
table{border-collapse:collapse;width:100%;font-size:.81rem}
thead th{position:sticky;top:0;background:var(--ink);color:#fff;text-align:left;padding:11px 13px;font-weight:600;white-space:nowrap;font-size:.73rem}
tbody td{padding:9px 13px;border-bottom:1px solid var(--line);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:top}
tbody tr:nth-child(even){background:#f7f8f6}
tbody tr:hover{background:var(--accent-soft)}
tbody td:first-child{font-weight:600;color:var(--accent)}

.state{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:46px 24px;text-align:center;color:var(--ink-soft)}
.state.err{border-color:var(--warn);color:var(--warn);background:#fdf3f0}
.state h3{font-family:'Fraunces',serif;font-weight:500;font-size:1.15rem;color:inherit;margin-bottom:6px}
.state p{font-size:.85rem;max-width:480px;margin:0 auto}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:rot 1s linear infinite}
footer{margin-top:30px;text-align:center;font-size:.74rem;color:var(--ink-soft)}
@media(max-width:560px){.brand h1{font-size:1.6rem}.sync{width:100%;justify-content:space-between}}

/* ====================  COMPONENTES NUEVOS  ==================== */
/* ---- Filtros: custom multi-select dropdown ---- */
.filters{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start;margin:0 0 18px}
.filt{display:flex;flex-direction:column;gap:5px;min-width:170px;position:relative}
.filt>span{font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
/* Botón del desplegable */
.filt-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);font-family:inherit;font-size:.86rem;color:var(--ink);cursor:pointer;text-align:left;transition:border-color .15s}
.filt-btn:hover,.filt-btn.open{border-color:var(--accent)}
.filt-btn .filt-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.filt-btn .filt-badge{background:var(--accent);color:#fff;font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:999px;flex-shrink:0}
.filt-btn .filt-arrow{width:12px;height:12px;flex-shrink:0;transition:transform .2s;color:var(--ink-soft)}
.filt-btn.open .filt-arrow{transform:rotate(180deg)}
/* Panel desplegable */
.filt-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 4px 20px rgba(21,48,63,.13);min-width:100%;max-width:280px;overflow:hidden}
.filt-panel.open{display:block}
.filt-search{padding:8px 10px;border-bottom:1px solid var(--line)}
.filt-search input{width:100%;padding:6px 10px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:.82rem;background:var(--paper)}
.filt-search input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.filt-options{max-height:200px;overflow-y:auto;padding:4px 0}
.filt-option{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:.84rem;transition:background .1s}
.filt-option:hover{background:var(--paper)}
.filt-option input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.filt-option.checked{background:var(--accent-soft)}
.filt-option label{flex:1;cursor:pointer;line-height:1.3}
.filt-footer{padding:6px 10px;border-top:1px solid var(--line);display:flex;gap:6px}
.filt-footer button{flex:1;padding:5px 0;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer;background:var(--card);color:var(--ink)}
.filt-footer button:hover{border-color:var(--accent);color:var(--accent)}
/* Date tree inside dropdown */
.filt-date-group{padding:4px 0}
.filt-date-section{border-bottom:1px solid var(--line)}
.filt-date-section:last-child{border-bottom:none}
.filt-date-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;font-size:.71rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;cursor:pointer;user-select:none}
.filt-date-hdr:hover{background:var(--paper)}
.filt-date-hdr .filt-date-arr{font-size:.7rem;transition:transform .15s}
.filt-date-hdr.open .filt-date-arr{transform:rotate(90deg)}
.filt-date-items{display:none;padding:2px 0 6px;max-height:220px;overflow-y:auto}
.filt-date-items.open{display:block}
.filters .btn-ghost{height:38px;align-self:flex-end}

/* ---- KPI: caption + Zonas de Riesgo ---- */
.kpi .cap{font-size:.69rem;color:var(--ink-soft);margin-top:8px;line-height:1.35}
.kpi.risk{border-color:#e7b3a6;background:#fdf4f1}
.kpi.risk .lbl{color:var(--warn)}
.kpi.risk .val{color:var(--warn);display:flex;align-items:center;gap:8px}
.kpi.risk .warnico{font-size:1.4rem;line-height:1}
.kpi.risk .cap{color:#a85c47}

/* ---- Calificación General (estrellas) ---- */
.rating-card .rc-body{display:flex;gap:22px;align-items:center;flex-wrap:wrap;margin-top:6px}
.rc-left{display:flex;flex-direction:column;gap:6px;align-items:flex-start;min-width:150px}
.stars{position:relative;display:inline-block;font-size:1.85rem;letter-spacing:2px;line-height:1}
.stars .s-empty{color:var(--line)}
.stars .s-full{position:absolute;left:0;top:0;overflow:hidden;white-space:nowrap;color:#e8a51c}
.rc-num{font-family:'Fraunces',serif;font-size:2.1rem;font-weight:500;letter-spacing:-.01em}
.rc-num small{font-family:'Spline Sans';font-size:.85rem;color:var(--ink-soft);font-weight:500}
.rc-right{flex:1;min-width:200px}

/* ---- Nivel de Satisfacción por Afirmación ---- */
.satp{display:flex;flex-direction:column;gap:16px;margin-top:6px}
.afil-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:7px}
.afil-q{font-size:.85rem;font-weight:600;line-height:1.35;flex:1;min-width:200px}
.afil-q .emo{margin-right:6px;font-size:1.05rem}
.afil-m{display:flex;align-items:center;gap:10px;white-space:nowrap;flex-wrap:wrap}
.afil-m .badge{color:#fff;font-weight:700;font-size:.74rem;padding:3px 9px;border-radius:999px}
.afil-m .pos{font-size:.76rem;color:var(--good);font-weight:600}
.afil-m .cant{font-size:.74rem;color:var(--ink-soft)}
.sbar{display:flex;height:14px;width:100%;border-radius:7px;overflow:hidden;background:var(--paper)}
.sbar .seg{height:100%}
.slegend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:8px}
.slegend .lg{display:inline-flex;align-items:center;gap:5px;font-size:.74rem;color:var(--ink-soft)}
.slegend .lg i{width:10px;height:10px;border-radius:3px;display:inline-block}
.slegend .lg b{color:var(--ink);font-weight:600}

/* ---- Panel por Secciones ---- */
.sec-bloque{display:flex;flex-direction:column;gap:0;margin-bottom:16px;border-radius:13px;overflow:hidden;box-shadow:var(--shadow)}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 18px;background:var(--ink);color:#fff}
.sec-hdr .sec-icon{font-size:1.1rem;line-height:1}
.sec-hdr .sec-nombre{font-family:'Fraunces',serif;font-weight:500;font-size:.95rem;letter-spacing:.01em}
.sec-hdr .sec-score{margin-left:auto;font-size:.8rem;font-weight:700;opacity:.9;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:999px;white-space:nowrap}
.sec-preguntas{background:var(--card);border:1px solid var(--line);border-top:none;padding:14px 18px;display:flex;flex-direction:column;gap:14px}
.sec-preguntas .afil{padding-bottom:14px;border-bottom:1px solid var(--line)}
.sec-preguntas .afil:last-child{padding-bottom:0;border-bottom:none}

/* ---- Distribución por emoción (equipo) ---- */
.emobars{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.erow{display:grid;grid-template-columns:minmax(120px,1.4fr) 3fr auto auto;align-items:center;gap:10px}
.elbl{font-size:.82rem;display:flex;align-items:center;gap:7px}
.elbl .eemo{font-size:1.05rem}
.ebar{height:13px;background:var(--paper);border-radius:7px;overflow:hidden}
.ebar i{display:block;height:100%;border-radius:7px}
.epct{font-size:.8rem;font-weight:700;color:var(--ink);min-width:38px;text-align:right}
.ecnt{font-size:.74rem;color:var(--ink-soft);min-width:24px;text-align:right}

/* ---- Voz del Colaborador ---- */
.voz .vbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin:10px 0 14px}
.vtabs{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.vtab{background:none;border:none;font-family:inherit;cursor:pointer;padding:7px 14px;font-size:.82rem;font-weight:600;color:var(--ink-soft);border-radius:8px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.vtab:hover{color:var(--ink)}
.vtab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 3px rgba(21,48,63,.1)}
.vtab .vn{font-size:.7rem;background:var(--line);color:var(--ink);border-radius:999px;padding:1px 7px;font-weight:700}
.vtab.active .vn{background:var(--accent-soft);color:var(--accent)}
.voz-search{flex:1;min-width:200px;max-width:340px}
.vpanel{display:none}
.vpanel.on{display:block}
.vcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px}
.vcard{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:0 9px 9px 0;padding:12px 14px;display:flex;flex-direction:column;gap:7px}
.vcard.mej{border-left-color:var(--orange)}
.vc-head{display:flex;flex-direction:column;gap:1px}
.vc-name{font-weight:600;font-size:.85rem;color:var(--ink)}
.vc-meta{font-size:.73rem;color:var(--ink-soft)}
.vc-meta .dot{margin:0 6px;opacity:.6}
.vc-txt{font-size:.84rem;line-height:1.5;color:var(--ink)}
.vempty,.vnone{padding:10px 2px}

/* ---- Pestañas de dimensión (onboarding) ---- */
.dim-tabs{display:flex;flex-wrap:wrap;gap:4px;margin:18px 0 14px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:4px;width:fit-content;max-width:100%}
.dim-tab{background:none;border:none;font-family:inherit;cursor:pointer;padding:7px 14px;font-size:.82rem;font-weight:600;color:var(--ink-soft);border-radius:8px;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
.dim-tab:hover{color:var(--ink)}
.dim-tab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 3px rgba(21,48,63,.1)}
.dim-tab .dim-icon{font-size:1rem;line-height:1}

@media(max-width:560px){
  .dim-tabs{gap:3px;padding:3px}
  .dim-tab{padding:6px 10px;font-size:.78rem}
}

</style>
</head>
<body>

<div id="gate" style="display:none">
  <div class="box">
    <h2>Talento Humano</h2>
    <p>Ingresa la clave para ver el panel</p>
    <input id="gatePass" type="password" placeholder="Clave de acceso" autocomplete="off"/>
    <button id="gateBtn">Entrar</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

const CONFIG = {

  sheetId: "1wQauXfeFSP6JljfkViI6-bbb_Ps5Gj-qq1UA5gpG-Gk",

  hojas: [

  autoRefreshMin: 5,   // Minutos entre relecturas automáticas. 0 = desactivado.
  password: "",        // Clave de acceso. "" = sin clave. (Barrera básica, no seguridad real.)
};
/* ====================  FIN DE LA CONFIGURACIÓN  ============================ */


const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\/[ao]\b/g,"").replace(/\([ao]\)/g,"").replace(/[,.;:]/g,"").replace(/\s+/g," ").trim();

/* ============================================================================
   ESCALAS DE SATISFACCIÓN  (acuerdo + 4 emocionales)  — TRANSFORMACIÓN CENTRAL
   ----------------------------------------------------------------------------
   · "orden" va de MEJOR a PEOR  ⇒  puntaje 5, 4, 3, 2, 1  (puntaje = 5 - índice).
   · Las 4 escalas emocionales y su puntaje provienen del requerimiento:
       Puntaje | Emoción 1     | Emoción 2     | Emoción 3      | Emoción 4
         5     | Seguro        | Bienvenido    | Inspirado      | Seguro
         4     | Tranquilo     | Acompañado    | Motivado       | Bastante prep.
         3     | Neutral       | Neutral       | Neutral        | Neutral
         2     | Inseguro      | Abrumado      | Saturado       | Poco preparado
         1     | Confundido    | Desorientado  | Desinteresado  | Inseguro
   · Una respuesta es "de riesgo" cuando su puntaje es ≤ 2 (las dos peores).
   · "sinon" tolera variantes y errores de tipeo del formulario (p. ej. "Neutral"
     como punto medio de la escala de acuerdo, o "Desinterado" sin la 2.ª "e").
   ============================================================================ */
const ESCALAS = {
  acuerdo:     { nombre:"Acuerdo", emocional:false, pos:2,
                 orden:["Muy de acuerdo","De acuerdo","Ni de acuerdo ni en desacuerdo","En desacuerdo","Muy en desacuerdo"],
                 sinon:{ "Ni de acuerdo ni en desacuerdo":["Neutral","Ni de acuerdo ni desacuerdo","Indiferente"] } },
  calidad:     { nombre:"Calidad", emocional:false, pos:2,
                 orden:["Excelente","Buena","Aceptable","Deficiente","Muy deficiente"] },
  /* Emoción 1 */
  seguridad:   { nombre:"Seguridad", emocional:true, pos:2,
                 orden:["Seguro","Tranquilo","Neutral","Inseguro","Confundido"], emojis:["😄","🙂","😐","🙁","😟"] },
  /* Emoción 2 */
  pertenencia: { nombre:"Pertenencia", emocional:true, pos:2,
                 orden:["Bienvenido","Acompañado","Neutral","Abrumado","Desorientado"], emojis:["😄","🙂","😐","🙁","😟"] },
  /* Emoción 3 */
  motivacion:  { nombre:"Motivación", emocional:true, pos:2,
                 orden:["Inspirado","Motivado","Neutral","Saturado","Desinteresado"], emojis:["😄","🙂","😐","🙁","😟"],
                 sinon:{ "Desinteresado":["Desinterado"] } },
  /* Emoción 4 */
  preparacion: { nombre:"Preparación", emocional:true, pos:2,
                 orden:["Seguro","Bastante preparado","Neutral","Poco preparado","Inseguro"], emojis:["😄","🙂","😐","🙁","😟"] },
};

/* Mapas derivados: valor normalizado → etiqueta canónica y → puntaje (1..5). */
const setEsc={}, canonDe={}, scoreDe={};
for(const k in ESCALAS){
  const E=ESCALAS[k]; setEsc[k]=new Set(); canonDe[k]={}; scoreDe[k]={};
  E.orden.forEach((lbl,idx)=>{
    [lbl, ...((E.sinon&&E.sinon[lbl])||[])].forEach(v=>{
      const nv=norm(v); setEsc[k].add(nv); canonDe[k][nv]=lbl; scoreDe[k][nv]=5-idx;
    });
  });
}
/* Devuelve la clave de la escala que contiene ≥60 % de los valores observados.
   Usa TODOS los valores (con repeticiones) para que un par de respuestas atípicas
   ("N/A", "Otro", etc.) no rompan la detección de la escala predominante.
   Si varias escalas empatan, gana la que tenga más valores exclusivos.           */
function escalaDe(valsNorm){
  const total=valsNorm.length; if(!total) return null;
  const scores={}; for(const k in ESCALAS) scores[k]=valsNorm.filter(v=>setEsc[k].has(v)).length;
  const umbral=total*0.60;   /* 60 %: tolera respuestas atípicas en formularios pequeños */
  const cand=Object.keys(scores).filter(k=>scores[k]>=umbral);
  if(!cand.length) return null;
  if(cand.length===1) return cand[0];
  /* Desempate: escala con más hits absolutos primero; luego exclusividad. */
  cand.sort((a,b)=>scores[b]-scores[a]);
  let best=cand[0], bestEx=-1;
  for(const k of cand){
    const otros=cand.filter(c=>c!==k);
    const ex=valsNorm.filter(v=>setEsc[k].has(v)&&!otros.some(o=>setEsc[o].has(v))).length;
    if(ex>bestEx){ bestEx=ex; best=k; }
  }
  return best;
}
/* Puntaje de una respuesta concreta dentro de su escala (1..5) o null. */
function puntajeRespuesta(escala,valor){ const p=scoreDe[escala][norm(valor)]; return p===undefined?null:p; }

const COL_ESCALA = ["#15795f","#6db89a","#c9c4b4","#dc9a6b","#bf4a30"];
const PALETA = ["#0e87bf","#e8621e","#15795f","#3d6fb0","#9c5c8f","#c9960a","#5b8c5a","#4a8a8f","#a8743c","#7a7d52","#b4452a","#5d6b78"];

/* ---------- Localiza columnas clave por el texto de la pregunta ---------- */
function colsDe(H){
  const find=fn=>{ for(let i=0;i<H.length;i++) if(fn(norm(H[i]))) return i; return -1; };
  return {
    nombre:     find(h=>h.includes("nombre completo")),
    primerDia:  find(h=>h.includes("primer dia")),
    fechaResp:  find(h=>h.includes("marca temporal")||h.includes("fecha de respuesta")||h.includes("timestamp")||h==="fecha"||h.startsWith("marca")),
    area:       find(h=>h.includes("area ingresaste")||h.includes("a que area")||(h.includes("area")&&h.includes("ingres"))),
    empresa:    find(h=>h.includes("empresa perteneces")||h.includes("a que empresa")||h==="empresa"),
    regional:   find(h=>h.includes("regional perteneces")||h.includes("a que regional")||h==="regional"),
    cargo:      find(h=>h.includes("tu cargo")||h==="cargo"),
    sucursal:   find(h=>h.includes("sucursal")),
    fortalezas: find(h=>h.includes("lo mejor de tu experiencia")||(h.includes("mejor")&&h.includes("experiencia de ingreso"))),
    mejoras:    find(h=>h.includes("mejorarias")||(h.includes("seleccion")&&h.includes("induccion"))),
    capacitacion: find(h=>
      h.includes("en cuales de tus funciones te gustaria recibir mayor capacitacion") ||
      h.includes("en cuáles de tus funciones te gustaría recibir mayor capacitación")
    ),
    estrellas:  find(h=>h.includes("estrella")),
  };
}
/* ---------- Helpers para obtener valores de filtro por fila ---------- */
function empresaDeRow(r,cols){
  /* Prioridad: columna explícita "¿A qué empresa?" */
  if(cols.empresa>=0){ const v=(r[cols.empresa]||"").trim(); if(v) return v; }
  /* Fallback: inferir desde el área (FC/CENSAL) */
  if(cols.area>=0){ const area=norm(r[cols.area]); return area.includes("censal")?"Censal":"Farmacias Chávez"; }
  return null;
}
function regionalDeRow(r,cols){
  if(cols.regional>=0) return (r[cols.regional]||"").trim()||null;
  return null;
}
/* Fecha de respuesta: usa fechaResp (marca temporal) si existe y tiene valor,
   si no cae a primerDia. Así funciona para todas las hojas. */
function fechaRespDeRow(r,cols,df){
  /* Prioridad: marca temporal / fecha de respuesta del formulario */
  if(cols.fechaResp>=0){
    const v=(r[cols.fechaResp]||"").trim();
    if(v){ const f=parseFecha(v,df); if(f) return f; }
  }
  /* Fallback: primer día (FC/Censal) */
  if(cols.primerDia>=0){
    const v=(r[cols.primerDia]||"").trim();
    if(v){ const f=parseFecha(v,df); if(f) return f; }
  }
  return null;
}
function mesDeRow(r,cols,df){
  if(cols.primerDia>=0){ const f=parseFecha(r[cols.primerDia],df); if(f) return f.getFullYear()+"-"+String(f.getMonth()).padStart(2,"0"); }
  return null;
}

/* ---------- Filtro en cascada — multi-select + árbol de fechas ----------
   filtros.empresa / regional / nombre → array de strings (vacío = todos)
   filtros.años / meses / fechas      → arrays que forman el árbol de fechas
   Un registro pasa si cumple TODOS los filtros activos.                    */
function arrOk(arr, val){ return !arr || arr.length===0 || arr.includes(val); }

function filtrar(rows,cols,df,F){
  return rows.filter(r=>{
    if(!arrOk(F.empresa,  empresaDeRow(r,cols)))   return false;
    if(!arrOk(F.regional, regionalDeRow(r,cols)))  return false;
    if(!arrOk(F.nombre,   cols.nombre>=0?(r[cols.nombre]||"").trim()||null:null)) return false;

    /* Árbol de fecha: años → meses → días */
    const hayFiltroFecha = (F.años&&F.años.length)||(F.meses&&F.meses.length)||(F.fechas&&F.fechas.length);
    if(hayFiltroFecha){
      const fd = fechaRespDeRow(r,cols,df);
      if(!fd) return false;
      const yy = String(fd.getFullYear());
      const mm = yy+"-"+String(fd.getMonth()+1).padStart(2,"0");
      const dd = yy+"-"+String(fd.getMonth()+1).padStart(2,"0")+"-"+String(fd.getDate()).padStart(2,"0");
      if(F.años  && F.años.length  && !F.años.includes(yy))   return false;
      if(F.meses && F.meses.length && !F.meses.includes(mm))  return false;
      if(F.fechas&& F.fechas.length&& !F.fechas.includes(dd)) return false;
    }
    return true;
  });
}

/* Valores únicos de un campo dado los filtros previos (para cascada) */
function opcionesCascada(rows,cols,df,filtrosPrevios,campo){
  const sub=filtrar(rows,cols,df,filtrosPrevios);
  const vals=new Set();
  sub.forEach(r=>{
    let v=null;
    if(campo==="empresa")  v=empresaDeRow(r,cols);
    if(campo==="regional") v=regionalDeRow(r,cols);
    if(campo==="nombre")   v=cols.nombre>=0?(r[cols.nombre]||"").trim()||null:null;
    if(campo==="año"){
      const fd=fechaRespDeRow(r,cols,df);
      if(fd) v=String(fd.getFullYear());
    }
    if(campo==="mes"){
      const fd=fechaRespDeRow(r,cols,df);
      if(fd) v=fd.getFullYear()+"-"+String(fd.getMonth()+1).padStart(2,"0");
    }
    if(campo==="fecha"){
      const fd=fechaRespDeRow(r,cols,df);
      if(fd) v=fd.getFullYear()+"-"+String(fd.getMonth()+1).padStart(2,"0")+"-"+String(fd.getDate()).padStart(2,"0");
    }
    if(v) vals.add(v);
  });
  return [...vals].sort((a,b)=>a.localeCompare(b,"es"));
}

/* ---------- CSV ---------- */
function parseCSV(text){
  const rows=[]; let row=[],val="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){val+='"';i++;} else inQ=false; } else val+=c; }
    else{
      if(c==='"')inQ=true;
      else if(c===',')row.push(val),val="";
      else if(c==='\n')row.push(val),rows.push(row),row=[],val="";
      else if(c!=='\r')val+=c;
    }
  }
  if(val!==""||row.length){row.push(val);rows.push(row);}
  return rows;
}
async function leerHoja(i){
  const url=`https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:csv&headers=1&gid=${CONFIG.hojas[i].gid}`;
  const text=await (await fetch(url,{cache:"no-store"})).text();
  if(text.trim().startsWith("<"))
    throw new Error("No se pudo leer la hoja. Verifica que esté compartida como “Cualquier persona con el enlace · Lector” y que el gid sea correcto.");
  const filas=parseCSV(text).filter(r=>r.some(c=>c.trim()!==""));
  if(!filas.length) return {headers:[],rows:[]};
  return {headers:filas[0],rows:filas.slice(1)};
}

/* ---------- Fechas (detecta día/mes según los datos) ----------
   Soporta:
     yyyy/mm/dd  yyyy-mm-dd  (Google Forms marca temporal, ISO)
     dd/mm/yyyy  dd-mm-yyyy  (formato boliviano)
     mm/dd/yyyy               (formato americano)
   La detección dayFirst aplica solo al formato ambiguo de 2 dígitos. */
const RX_ISO   = /^\s*(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/;
const RX_FECHA = /^\s*(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/;
const MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const MESES_LARGO=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function parseFecha(str,dayFirst){
  if(!str) return null;
  /* Quita la parte de hora si existe: "12/3/2025 8:30:00" → "12/3/2025" */
  const s = (str||"").trim().split(/\s+/)[0];
  /* Formato ISO / Google Forms: yyyy/mm/dd o yyyy-mm-dd (año primero, 4 dígitos) */
  const mi = s.match(RX_ISO);
  if(mi){
    const y=+mi[1], mo=+mi[2], d=+mi[3];
    if(mo>=1&&mo<=12&&d>=1&&d<=31){ const dt=new Date(y,mo-1,d); return isNaN(dt)?null:dt; }
    return null;
  }
  /* Formato dd/mm/yyyy o mm/dd/yyyy */
  const m = s.match(RX_FECHA); if(!m) return null;
  let a=+m[1],b=+m[2],y=+m[3]; if(y<100) y+=2000;
  let d=dayFirst?a:b, mo=dayFirst?b:a;
  if(!d||!mo||mo>12||d>31) return null;
  const dt=new Date(y,mo-1,d); return isNaN(dt)?null:dt;
}
function detectarDayFirst(vals){
  for(const v of vals){
    /* Quita parte de hora antes de analizar */
    const s=(v||"").trim().split(/\s+/)[0];
    /* Si empieza con 4 dígitos → formato ISO, dayFirst no aplica */
    if(/^\s*\d{4}[\/\-]/.test(s)) return false;
    const m=s.match(RX_FECHA); if(!m) continue;
    if(+m[1]>12) return true;   /* primer token > 12 → es día */
    if(+m[2]>12) return false;  /* segundo token > 12 → es día, entonces mm/dd */
  }
  return true; // por defecto formato boliviano dd/mm/yyyy
}

/* ---------- Conteo (fusiona variantes de mayúsculas; admite opción múltiple) ---------- */
function contar(values,multi){
  const tokens=[];
  values.forEach(v=>{
    if(multi) v.split(";").forEach(t=>{t=t.trim(); if(t)tokens.push(t);});
    else { const t=v.trim(); if(t)tokens.push(t); }
  });
  const byKey={};
  tokens.forEach(t=>{ const k=norm(t); (byKey[k]=byKey[k]||{})[t]=(byKey[k][t]||0)+1; });
  const res={};
  for(const k in byKey){
    const lbl=Object.entries(byKey[k]).sort((a,b)=>b[1]-a[1])[0][0];
    res[lbl]=Object.values(byKey[k]).reduce((a,b)=>a+b,0);
  }
  return res;
}

/* ---------- MOTOR: analiza una hoja ----------
   Clasifica cada columna y, para las escalas de acuerdo/emocionales, calcula:
     · conteo por nivel        · total de respuestas
     · % positivo (mejores N)  · puntaje promedio (1..5)
     · riesgo (respuestas con puntaje ≤ 2)
   Agregados globales que devuelve:
     · satGeneral  = (Σ puntajes obtenidos / Σ puntajes máximos) × 100   (req. 6)
     · riesgoTotal = total de respuestas en zona de riesgo                (req. 2)
   La calificación numérica prioriza la pregunta de estrellas (req. 7).      */
function analizar(d){
  const H=d.headers,R=d.rows,n=H.length;
  const col=i=>R.map(r=>(r[i]||"").trim());
  const esMeta=h=>{const x=norm(h);return x==="id"||x.includes("hora de ")||x.startsWith("correo")||x==="nombre"||x.startsWith("nombre completo");};

  const categoricas=[],likerts=[],textos=[],multis=[]; let ratingEstrellas=null,ratingGen=null,evento=null,eventoPD=false;

  for(let i=0;i<n;i++){
    if(esMeta(H[i])) continue;
    const vals=col(i).filter(v=>v!=="");
    if(!vals.length) continue;
    const hn=norm(H[i]);
    const esFecha=vals.filter(v=>RX_FECHA.test(v)||RX_ISO.test(v)).length/vals.length>0.7;

    if(esFecha){
      const esPD=hn.includes("primer dia");                       // pregunta del primer día (prioritaria)
      const keyword=esPD||hn.includes("marca temporal")||hn.includes("fecha");
      if(keyword && (!evento || (esPD && !eventoPD))){            // el primer día reemplaza a la marca temporal
        const df=detectarDayFirst(vals);
        const fs=vals.map(v=>parseFecha(v,df)).filter(Boolean);
        if(fs.length){
          const b={}; fs.forEach(f=>{const k=f.getFullYear()+"-"+String(f.getMonth()).padStart(2,"0");b[k]=(b[k]||0)+1;});
          const ks=Object.keys(b).sort();
          const mn=new Date(Math.min(...fs)),mx=new Date(Math.max(...fs));
          evento={labels:ks.map(k=>{const[y,m]=k.split("-");return MESES[+m]+" "+y;}),data:ks.map(k=>b[k]),
                  periodo:MESES[mn.getMonth()]+" "+mn.getFullYear()+" – "+MESES[mx.getMonth()]+" "+mx.getFullYear()};
          eventoPD=esPD;
        }
      }
      continue;
    }
    /* Numérica → calificación. Se prioriza la pregunta de estrellas. */
    if(vals.every(v=>/^\d+(\.\d+)?$/.test(v))){
      const nums=vals.map(Number), mx=Math.max(...nums);
      const escalaMax=mx<=5?5:10, dist={};
      for(let s=1;s<=escalaMax;s++)dist[s]=0;
      nums.forEach(x=>{const k=Math.round(x); if(dist[k]!==undefined)dist[k]++;});
      const r={header:H[i],prom:nums.reduce((a,b)=>a+b,0)/nums.length,max:escalaMax,dist,total:nums.length,esEstrellas:hn.includes("estrella")};
      if(r.esEstrellas) ratingEstrellas=r; else if(!ratingGen) ratingGen=r;
      continue;
    }
    const conMulti=vals.filter(v=>v.includes(";")).length/vals.length>0.4;
    if(conMulti){ multis.push({header:H[i],conteo:contar(vals,true),total:vals.length}); continue; }

    /* ¿Encaja en una escala (acuerdo / calidad / emocional)? → puntaje 1..5 */
    const valsNorm=vals.map(norm);
    const escala=escalaDe(valsNorm);
    if(escala){
      const E=ESCALAS[escala], conteo={}; E.orden.forEach(l=>conteo[l]=0);
      let sumPts=0, riesgo=0;
      vals.forEach(v=>{ const nv=norm(v), lbl=canonDe[escala][nv]; if(lbl===undefined) return;
        conteo[lbl]++; const p=scoreDe[escala][nv]; sumPts+=p; if(p<=2) riesgo++; });
      const tot=Object.values(conteo).reduce((a,b)=>a+b,0);
      let pos=0; E.orden.forEach((l,idx)=>{ if(idx<E.pos) pos+=conteo[l]; });
      likerts.push({header:H[i],escala,emocional:E.emocional,conteo,total:tot,
        pct:tot?Math.round(pos/tot*100):0, score:tot?sumPts/tot:0, riesgo});
      continue;
    }
    const distintos=[...new Set(vals)];
    const avgLen=vals.reduce((a,v)=>a+v.length,0)/vals.length;
    const ratio=distintos.length/vals.length;
    /* Umbral generoso: sólo va a "textos" si hay demasiadas opciones distintas
       Y las respuestas son largas. Así columnas de salida QZ (cargo, motivo, etc.)
       se clasifican como categóricas en lugar de perderse como texto libre. */
    if(distintos.length>40 || (avgLen>40 && ratio>0.6)){ textos.push({header:H[i],vals}); continue; }
    if(distintos.length>=2) categoricas.push({header:H[i],conteo:contar(vals,false),total:vals.length});
  }

  /* Agregados globales sobre TODAS las escalas (acuerdo + emocionales). */
  let satis=null;
  if(likerts.length) satis=Math.round(likerts.reduce((a,L)=>a+L.pct,0)/likerts.length);   // % positivo medio (compatibilidad)
  let sumPts=0, totResp=0, riesgoTotal=0;
  likerts.forEach(L=>{ sumPts+=L.score*L.total; totResp+=L.total; riesgoTotal+=L.riesgo; });
  const satGeneral = totResp ? Math.round(sumPts/(5*totResp)*100) : null;   // (obtenido / máximo posible) × 100

  let motivo=null;
  const cm=categoricas.find(c=>norm(c.header).includes("motivo"));
  if(cm) motivo=Object.entries(cm.conteo).sort((a,b)=>b[1]-a[1])[0][0];

  return {categoricas,likerts,textos,multis,rating:ratingEstrellas||ratingGen,evento,
          satis,satGeneral,riesgoTotal,totRespEscala:totResp,motivo,total:R.length};
}

async function sincronizar(){
  const btn=document.getElementById("btnSync");
  btn.disabled=true; btn.classList.add("spin");

    '<div class="state"><div class="spinner"></div><h3>Cargando datos…</h3><p>Leyendo las hojas desde Google Sheets.</p></div>';

    catch(e){ datos[i]={headers:[],rows:[],error:e.message}; }

  const a=new Date();
  document.getElementById("lastSync").textContent=
    a.toLocaleDateString("es-BO")+" · "+a.toLocaleTimeString("es-BO",{hour:"2-digit",minute:"2-digit"});
  btn.disabled=false; btn.classList.remove("spin");
  render(); iniciarCuenta();
}
function iniciarCuenta(){
  if(countdownTimer)clearInterval(countdownTimer);
  if(!CONFIG.autoRefreshMin)return;
  let seg=CONFIG.autoRefreshMin*60; const el=document.getElementById("nextSync");
  const tick=()=>{ if(seg<=0){sincronizar();return;}
    el.textContent=`Auto-actualiza en ${Math.floor(seg/60)}:${String(seg%60).padStart(2,"0")}`; seg--; };
  tick(); countdownTimer=setInterval(tick,1000);
}

/* ===== Panel de ONBOARDING (Farmacias Chávez/CENSAL y Quimiza) ===== */
function renderOnboarding(d,cont){
  const H=d.headers, cols=colsDe(H);
  /* df: detectar formato de fecha desde primerDia o, si no existe, desde fechaResp */
  const dfVals = cols.primerDia>=0 ? d.rows.map(r=>r[cols.primerDia]||"")
               : cols.fechaResp>=0 ? d.rows.map(r=>r[cols.fechaResp]||"") : [];
  const df = detectarDayFirst(dfVals);

  /* Determina qué filtros aplican a esta hoja */
  const tieneEmpresa = cols.empresa>=0 || (cols.area>=0 && d.rows.some(r=>norm(r[cols.area]).includes("censal")));
  const tieneRegional = cols.regional>=0;

  /* Aplicar filtros globales → analizar SOLO el subconjunto filtrado. */
  const rows = filtrar(d.rows, cols, df, filtros);
  datosVista = {headers:H, rows};

  let html = barraFiltros(d.rows, cols, df, tieneEmpresa, tieneRegional);

  if(!rows.length){
    html += '<div class="state"><h3>Sin registros</h3><p>Ningún colaborador coincide con los filtros seleccionados.</p></div>' + toolbarTabla();
    cont.innerHTML=html; wireFiltros(d.rows,cols,df,tieneEmpresa,tieneRegional); wireTabla(); return;
  }

  /* Detectar tipo de hoja (FC/CENSAL vs QZ) para mapeo por posición */
  const titulo=CONFIG.hojas[hojaActiva].titulo;
  const esQZ = norm(titulo).includes("quimiza");

  /* Rangos de columnas por posición (0-based, según especificación):
     FC/CENSAL: Proceso Selección 13-16, Bienvenida 17-20, Inducción 21-24,
                Capacitación 25-28, (Solicitud col 29), Equipo 30-33
     QZ:        Proceso Selección 10-13, Bienvenida 14-17, Inducción 18-21,
                Capacitación 22-25, (Solicitud col 26), Equipo 27-30            */
  const RANGOS_DIMS = esQZ
    ? [ [10,13],[14,17],[18,21],[22,25],[27,30] ]   // QZ (0-based, inclusive)
    : [ [13,16],[17,20],[21,24],[25,28],[30,33] ];   // FC/CENSAL

  const A = analizarConDimensiones({headers:H, rows}, RANGOS_DIMS);

  /* --- KPIs: Ingresos · Satisfacción General · Zonas de Riesgo · Período --- */
  html+='<section class="kpis">';
  html+=kpi("Ingresos registrados", rows.length);
  if(A.satGeneral!==null)
    html+=kpiCap("Satisfacción General", A.satGeneral+'<small>%</small>', A.satGeneral, A.totRespEscala+" respuestas consideradas");
  html+=kpiRiesgo(A.riesgoTotal);
  html+='</section>';

  /* --- Resumen: Calificación General (estrellas) + Ingresos por mes --- */
  const piezas=[];
  if(A.rating && A.rating.esEstrellas) piezas.push(tarjetaEstrellas(A.rating));
  if(A.evento) piezas.push(card("c_tl","Ingresos por mes","Cantidad de ingresos por mes",280));
  if(piezas.length) html+='<div class="section-t">Resumen</div><div class="grid">'+piezas.join("")+'</div>';

  /* --- Panel por Dimensiones con tabs --- */
  html+=panelPorDimensiones(A.dimensiones);

  /* --- Voz del Colaborador (Fortalezas / Oportunidades de mejora) --- */
  html+=seccionVoz(rows, cols);

  /* --- Tabla en bruto (respeta los filtros) --- */
  html+=toolbarTabla();

  cont.innerHTML=html;

  /* Gráficos: línea de ingresos por mes y distribución de estrellas. */
  if(A.evento)
    addChart("c_tl",{type:"bar",data:{labels:A.evento.labels,
      datasets:[{data:A.evento.data,backgroundColor:"#0e87bf",borderRadius:5,maxBarThickness:46}]},
      options:opts({})});
  if(A.rating && A.rating.esEstrellas){
    const labels=Object.keys(A.rating.dist);
    addChart("c_rt",{type:"bar",data:{labels:labels.map(l=>l+"★"),
      datasets:[{data:labels.map(l=>A.rating.dist[l]),backgroundColor:"#e8a51c",borderRadius:5,maxBarThickness:34}]},
      options:opts({})});
  }

  wireFiltros(d.rows,cols,df,tieneEmpresa,tieneRegional); wireVoz(); wireTabla(); wireDimTabs(A.dimensiones);
}

/* Prefijos largos a eliminar para mostrar nombre corto en gráficos de valoración */
const PREFIJOS_VALORACION = [
  "valoración de la experiencia  [", "valoracion de la experiencia  [",
  "valoración de la experiencia [",  "valoracion de la experiencia [",
  "valoración de la experiencia[",   "valoracion de la experiencia[",
];
function nombreCortoValoracion(header){
  const hn = header.toLowerCase();
  for(const p of PREFIJOS_VALORACION){
    if(hn.startsWith(p)){
      let r = header.slice(p.length);
      if(r.endsWith("]")) r = r.slice(0,-1);
      return r.trim();
    }
  }
  return header;
}

function renderLegacy(d,titulo,cont){
  const H=d.headers, cols=colsDe(H);
  const dfVals2 = cols.primerDia>=0 ? d.rows.map(r=>r[cols.primerDia]||"")
                : cols.fechaResp>=0 ? d.rows.map(r=>r[cols.fechaResp]||"") : [];
  const df = detectarDayFirst(dfVals2);

  /* Salida de Personal: sin filtro de empresa */
  const tieneEmpresa = false;
  const tieneRegional = cols.regional>=0;

  /* Aplicar filtros */
  const rows = filtrar(d.rows, cols, df, filtros);
  datosVista = {headers:H, rows};

  let html = barraFiltros(d.rows, cols, df, tieneEmpresa, tieneRegional);

  const esSalida=norm(titulo).includes("salida");

  if(!rows.length){
    html += '<div class="state"><h3>Sin registros</h3><p>Ningún colaborador coincide con los filtros seleccionados.</p></div>' + toolbarTabla();
    cont.innerHTML=html; wireFiltros(d.rows,cols,df,tieneEmpresa,tieneRegional); wireTabla(); return;
  }

  const A=analizar({headers:H, rows});

  /* --- Valoración Positiva: columnas E–H (índices 4–7), escala calidad --- */
  /* Filtramos los likerts cuyo encabezado corresponde a "Valoración de la Experiencia [...]" */
  const esValoracion = L => {
    const hn = norm(L.header);
    return hn.includes("valoracion de la experiencia") || hn.includes("valoración de la experiencia");
  };
  const likertsVal = A.likerts.filter(esValoracion);
  let valoracionPositiva = null, totRespValoracion = 0;
  if(likertsVal.length){
    let sumPts=0, totPts=0;
    likertsVal.forEach(L=>{ sumPts+=L.score*L.total; totPts+=L.total; });
    totRespValoracion = totPts;
    valoracionPositiva = totPts ? Math.round(sumPts/(5*totPts)*100) : null;
  }

  html+='<section class="kpis">';
  html+=kpi(esSalida?"Salidas registradas":"Ingresos registrados",A.total);
  if(A.rating){ const p=Math.round(A.rating.prom/A.rating.max*100);
    html+=kpi("Calificación general",A.rating.prom.toFixed(1)+`<small> / ${A.rating.max}</small>`,p); }
  /* KPI Valoración Positiva: igual que Satisfacción General en Onboarding */
  if(valoracionPositiva!==null)
    html+=kpiCap("Valoración positiva", valoracionPositiva+'<small>%</small>', valoracionPositiva, totRespValoracion+" respuestas consideradas");
  else if(A.satis!==null)
    html+=kpiCap(esSalida?"Valoración positiva":"Satisfacción general",A.satis+'<small>%</small>',A.satis,"");
  if(A.motivo) html+=kpi("Motivo más frecuente",`<span style="font-size:1.15rem">${esc(A.motivo)}</span>`);
  if(A.evento) html+=kpi("Período cubierto",`<span style="font-size:1.15rem">${A.evento.periodo}</span>`);
  html+='</section>';

  /* --- Resumen: Salidas por mes + Calificación general (gráfico) --- */
  if(A.evento||A.rating){
    html+='<div class="section-t">Resumen</div><div class="grid">';
    if(A.evento) html+=card("c_tl",esSalida?"Salidas por mes":"Ingresos por mes","Cantidad por mes",280);
    if(A.rating) html+=card("c_rt",esc(A.rating.header),"Promedio: "+A.rating.prom.toFixed(1)+" de "+A.rating.max,280);
    html+='</div>';
  }

  /* --- Valoración de la Experiencia: igual que Onboarding (afilRow por pregunta) --- */
  if(likertsVal.length){
    html+='<div class="section-t">Valoración de la Experiencia</div>';
    html+='<div class="grid"><div class="cardc full">';
    html+='<h3>Valoración de la Experiencia</h3>';
    html+='<div class="sub">Distribución de respuestas por dimensión · escala Excelente→Muy deficiente</div>';
    html+='<div class="satp">';
    /* Ordenar por % positivo descendente, y mostrar nombre corto */
    [...likertsVal].sort((a,b)=>b.pct-a.pct).forEach(L=>{
      const Lmod = {...L, header: nombreCortoValoracion(L.header)};
      html+=afilRow(Lmod);
    });
    html+='</div></div></div>';
  }

  /* --- Otras escalas que NO son valoración de experiencia --- */
  const porEsc={}; A.likerts.filter(L=>!esValoracion(L)).forEach(L=>{(porEsc[L.escala]=porEsc[L.escala]||[]).push(L);});
  for(const k in porEsc){
    porEsc[k].sort((a,b)=>b.pct-a.pct);
    const t=ESCALAS[k].emocional?"Valoración emocional · "+ESCALAS[k].nombre:(k==="acuerdo"?"Nivel de acuerdo por afirmación":"Valoración de la experiencia");
    const hPx = Math.max(320, porEsc[k].length*52+86);
    html+=`<div class="section-t">${t}</div><div class="grid"><div class="cardc full">`
        +`<h3>${t}</h3><div class="sub">Distribución de respuestas · ordenado por % positivo</div>`
        +`<div class="chartbox" style="height:${hPx}px"><canvas id="c_lk_${k}"></canvas></div></div></div>`;
  }

  if(A.categoricas.length||A.multis.length){
    html+='<div class="section-t">Distribución de respuestas</div><div class="grid">';
    A.categoricas.forEach((c,i)=>{
      const nOpts=Object.keys(c.conteo).length;
      const h=nOpts<=6?260:Math.min(600,Math.max(260,nOpts*28+60));
      html+=card("c_cat"+i,esc(c.header),nOpts+" opciones · "+c.total+" respuestas",h);
    });
    A.multis.forEach((m,i)=>{ html+=card("c_mul"+i,esc(m.header),"Opción múltiple · "+m.total+" personas",260); });
    html+='</div>';
  }

  if(A.textos.length){
    html+='<div class="section-t">Comentarios y sugerencias</div><div class="grid">';
    A.textos.forEach(t=>{
      const lista=t.vals.filter(v=>v.trim()&&v.trim()!=="."&&norm(v)!=="ninguna"&&norm(v)!=="ninguno");
      html+=`<div class="cardc full"><h3>${esc(t.header)}</h3><div class="sub">${lista.length} comentario(s)</div><div class="comments">`
          +(lista.length?lista.map(v=>`<div class="q">${esc(v)}</div>`).join(""):'<div class="sub">Sin comentarios.</div>')
          +'</div></div>';
    });
    html+='</div>';
  }

  html+=toolbarTabla();
  cont.innerHTML=html;

  if(A.evento)
    addChart("c_tl",{type:"bar",data:{labels:A.evento.labels,
      datasets:[{data:A.evento.data,backgroundColor:"#0e87bf",borderRadius:5,maxBarThickness:46}]},options:opts({})});
  if(A.rating){
    const labels=Object.keys(A.rating.dist);
    addChart("c_rt",{type:"bar",data:{labels,
      datasets:[{data:labels.map(l=>A.rating.dist[l]),backgroundColor:"#e8621e",borderRadius:5,maxBarThickness:38}]},options:opts({})});
  }
  for(const k in porEsc){
    const Ls=porEsc[k], cfg=ESCALAS[k];
    const datasets=cfg.orden.map((nivel,idx)=>({label:nivel,backgroundColor:COL_ESCALA[idx],
      data:Ls.map(L=>{const t=L.total; return t?Math.round((L.conteo[nivel]||0)/t*100):0;})}));
    const wrapLbl=s=>{const words=s.split(" ");const lines=[];let cur="";
      words.forEach(w=>{if((cur+" "+w).trim().length>40&&cur){lines.push(cur);cur=w;}else cur=(cur+" "+w).trim();});
      if(cur)lines.push(cur); return lines;};
    const labels=Ls.map(L=>wrapLbl(L.pct+"% · "+L.header));
    addChart("c_lk_"+k,{type:"bar",
      data:{labels,datasets},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",
        plugins:{legend:{position:"bottom",labels:{boxWidth:12,boxHeight:12,padding:12,font:{size:11}}},
          tooltip:{callbacks:{label:c=>{const L=Ls[c.dataIndex]; return ` ${c.dataset.label}: ${L.conteo[c.dataset.label]||0} (${c.parsed.x}%)`;}}}},
        scales:{x:{stacked:true,max:100,ticks:{callback:v=>v+"%",font:{size:11}}},
                y:{stacked:true,grid:{display:false},ticks:{font:{size:10},autoSkip:false}}}}});
  }
  A.categoricas.forEach((c,i)=>{
    const ent=Object.entries(c.conteo).sort((a,b)=>b[1]-a[1]);
    if(ent.length<=6)
      addChart("c_cat"+i,{type:"doughnut",data:{labels:ent.map(e=>e[0]),
        datasets:[{data:ent.map(e=>e[1]),backgroundColor:PALETA,borderColor:"#fff",borderWidth:2}]},options:opts({donut:true})});
    else{ const top=ent.slice(0,20);
      addChart("c_cat"+i,{type:"bar",data:{labels:top.map(e=>corta(e[0],36)),
        datasets:[{data:top.map(e=>e[1]),backgroundColor:"#3d6fb0",borderRadius:4}]},options:opts({horizontal:true})}); }
  });
  A.multis.forEach((m,i)=>{
    const ent=Object.entries(m.conteo).sort((a,b)=>b[1]-a[1]);
    addChart("c_mul"+i,{type:"bar",data:{labels:ent.map(e=>corta(e[0],30)),
      datasets:[{data:ent.map(e=>e[1]),backgroundColor:"#15795f",borderRadius:4}]},options:opts({horizontal:true})});
  });

  wireFiltros(d.rows,cols,df,tieneEmpresa,tieneRegional); wireTabla();
}

function kpi(lbl,val,barra){
  return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val">${val}</div>`
       +(barra!==undefined?`<div class="bar"><i style="width:${barra}%"></i></div>`:"")+`</div>`;
}
function card(id,t,sub,h){
  return `<div class="cardc"><h3>${t}</h3><div class="sub">${sub}</div>`
       +`<div class="chartbox" style="height:${h}px"><canvas id="${id}"></canvas></div></div>`;
}
function opts(o){
  return {responsive:true,maintainAspectRatio:false,indexAxis:o.horizontal?"y":"x",
    plugins:{legend:{display:!!o.donut,position:"right",labels:{boxWidth:12,boxHeight:12,padding:10,font:{size:11}}}},
    scales:o.donut?{}:{
      x:{grid:{display:!!o.horizontal},ticks:{font:{size:11},precision:0}},
      y:{grid:{display:!o.horizontal},ticks:{font:{size:11},precision:0}}}};
}

/* =====================  COMPONENTES NUEVOS (ONBOARDING)  ===================== */

/* ---------- KPI con leyenda y KPI de Zonas de Riesgo (req. 2) ---------- */
function kpiCap(lbl,val,barra,cap){
  return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val">${val}</div>`
       +(barra!==undefined&&barra!==null?`<div class="bar"><i style="width:${barra}%"></i></div>`:"")
       +(cap?`<div class="cap">${cap}</div>`:"")+`</div>`;
}
function kpiRiesgo(n){
  return `<div class="kpi risk"><div class="lbl">Zonas de Riesgo</div>`
       +`<div class="val"><span class="warnico">⚠</span> ${n}</div>`
       +`<div class="cap">respuestas en zona de riesgo · escalas de acuerdo y emocionales valoradas negativamente</div></div>`;
}

/* ---------- Filtros: dropdowns multi-select personalizados ----------
   Cada filtro es un botón desplegable con checkboxes internos.
   El árbol de fechas (Año → Mes → Día) vive dentro de un solo dropdown
   con secciones colapsables. Cascada completa entre todos los filtros.   */

const ARROW_SVG = `<svg class="filt-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>`;

function mkDropdown(id, label, items, seleccionados, searchable){
  const n = seleccionados.length;
  const badge = n ? `<span class="filt-badge">${n}</span>` : "";
  const lbl = n ? (n===1 ? esc(seleccionados[0]) : `${n} seleccionados`) : label;

  let panel = `<div class="filt-panel" id="panel_${id}">`;
  if(searchable) panel += `<div class="filt-search"><input type="text" placeholder="Buscar…" id="search_${id}"/></div>`;
  panel += `<div class="filt-options" id="opts_${id}">`;
  items.forEach((v,i)=>{
    const chk = seleccionados.includes(v) ? " checked" : "";
    const cls = seleccionados.includes(v) ? " checked" : "";
    panel += `<label class="filt-option${cls}" data-val="${esc(v)}">
      <input type="checkbox" value="${esc(v)}"${chk} data-filt="${id}"/>
      <span>${esc(v)}</span></label>`;
  });
  panel += `</div>`;
  panel += `<div class="filt-footer">
    <button onclick="selectAll('${id}')">Todos</button>
    <button onclick="clearFilt('${id}')">Ninguno</button>
    <button onclick="applyOK('${id}')" style="background:var(--accent);color:#fff;border-color:var(--accent)">OK</button>
  </div></div>`;

  return `<label class="filt"><span>${label}</span>
    <button class="filt-btn" id="btn_${id}" onclick="toggleDrop('${id}')">
      <span class="filt-lbl">${lbl}</span>${badge}${ARROW_SVG}
    </button>${panel}</label>`;
}

function mkDateDropdown(optsAños, optsMeses, optsDias){
  const total = filtros.años.length + filtros.meses.length + filtros.fechas.length;
  const badge = total ? `<span class="filt-badge">${total}</span>` : "";
  const lbl   = total ? `${total} fecha(s)` : "Fecha";

  const mesLbl = v=>{ const[y,m]=v.split("-"); return MESES_LARGO[+m-1]+" "+y; };
  const diaLbl = v=>{ const p=v.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; };

  const mkSec = (titulo, items, campo, labelFn) => {
    if(!items.length) return "";
    /* Siempre abierto por defecto cuando la sección tiene opciones, para que
       el usuario vea los checkboxes apenas despliega el filtro. */
    const isOpen = " open";
    let s = `<div class="filt-date-section" data-sec="${campo}">
      <div class="filt-date-hdr${isOpen}" onclick="toggleDateSec(this)">
        <span>${titulo}</span><span class="filt-date-arr">&#9658;</span>
      </div><div class="filt-date-items${isOpen}">`;
    items.forEach(v => {
      const chk = filtros[campo].includes(v);
      s += `<label class="filt-option${chk?" checked":""}" data-val="${esc(v)}">
        <input type="checkbox" value="${esc(v)}"${chk?" checked":""} data-filt="${campo}"/>
        <span>${esc(labelFn(v))}</span></label>`;
    });
    s += `</div></div>`;
    return s;
  };

  let panel = `<div class="filt-panel" id="panel_fDate"><div class="filt-date-group" id="fdate-group">`;
  panel += mkSec("Año", optsAños,  "años",   v=>v);
  panel += mkSec("Mes", optsMeses, "meses",  mesLbl);
  panel += mkSec("Día", optsDias,  "fechas", diaLbl);
  panel += `</div><div class="filt-footer">
    <button onclick="clearFiltDate()">Ninguno</button>
    <button onclick="applyOK('fDate')" style="background:var(--accent);color:#fff;border-color:var(--accent)">OK</button>
  </div></div>`;

  return `<label class="filt"><span>Fecha</span>
    <button class="filt-btn" id="btn_fDate" onclick="toggleDrop('fDate')">
      <span class="filt-lbl">${lbl}</span>${badge}${ARROW_SVG}
    </button>${panel}</label>`;
}

/* Regenera las secciones Mes y Día dentro del panel ya abierto (cascada sin cerrar) */
function refreshDateCascade(){
  const group = document.getElementById("fdate-group");
  if(!group || !_dateCtx) return;
  const {allRows, cols, df} = _dateCtx;

  const mesLbl = v=>{ const[y,m]=v.split("-"); return MESES_LARGO[+m-1]+" "+y; };
  const diaLbl = v=>{ const p=v.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; };

  /* Calcula opciones disponibles según cascada */
  const fBase = {empresa:filtros.empresa,regional:filtros.regional,nombre:filtros.nombre,años:[],meses:[],fechas:[]};
  const fY  = {...fBase,  años:filtros.años};
  const optsMeses = opcionesCascada(allRows, cols, df, fY, "mes");
  const fM  = {...fY,    meses:filtros.meses};
  const optsDias  = opcionesCascada(allRows, cols, df, fM, "fecha");

  /* Elimina y reemplaza solo las secciones Mes y Día */
  group.querySelectorAll('[data-sec="meses"],[data-sec="fechas"]').forEach(s=>s.remove());

  const mkSecHTML = (titulo, items, campo, labelFn) => {
    if(!items.length) return "";
    /* Abierta por defecto: si la cascada acaba de generar la sección, queremos
       que el usuario vea inmediatamente los checkboxes disponibles. */
    const isOpen = " open";
    let s = `<div class="filt-date-section" data-sec="${campo}">
      <div class="filt-date-hdr${isOpen}" onclick="toggleDateSec(this)">
        <span>${titulo}</span><span class="filt-date-arr">&#9658;</span>
      </div><div class="filt-date-items${isOpen}">`;
    items.forEach(v => {
      const chk = filtros[campo].includes(v);
      s += `<label class="filt-option${chk?" checked":""}" data-val="${esc(v)}">
        <input type="checkbox" value="${esc(v)}"${chk?" checked":""} data-filt="${campo}"/>
        <span>${esc(labelFn(v))}</span></label>`;
    });
    return s + `</div></div>`;
  };

  group.insertAdjacentHTML("beforeend", mkSecHTML("Mes", optsMeses, "meses", mesLbl));
  group.insertAdjacentHTML("beforeend", mkSecHTML("Día", optsDias,  "fechas", diaLbl));

  /* Actualiza badge del botón */
  updateDateBadge();
}

function updateDateBadge(){
  const total = filtros.años.length + filtros.meses.length + filtros.fechas.length;
  const btn = document.getElementById("btn_fDate"); if(!btn) return;
  btn.querySelector(".filt-lbl").textContent = total ? total+" fecha(s)" : "Fecha";
  let badge = btn.querySelector(".filt-badge");
  if(total && !badge){ btn.querySelector(".filt-lbl").insertAdjacentHTML("afterend",`<span class="filt-badge">${total}</span>`); }
  else if(total && badge){ badge.textContent = total; }
  else if(!total && badge){ badge.remove(); }
}

function clearFiltDate(){
  filtros.años=[]; filtros.meses=[]; filtros.fechas=[];
  refreshDateCascade();
}

function getMultiVal(id){
  const el=document.getElementById(id); if(!el) return [];
  return [...el.selectedOptions].map(o=>o.value);
}

function barraFiltros(allRows, cols, df, tieneEmpresa, tieneRegional){
  const fE = {empresa:[],regional:[],nombre:[],años:[],meses:[],fechas:[]};
  const optsEmpresa  = tieneEmpresa  ? opcionesCascada(allRows,cols,df,fE,"empresa")  : [];
  const fR = {...fE, empresa:filtros.empresa};
  const optsRegional = tieneRegional ? opcionesCascada(allRows,cols,df,fR,"regional") : [];
  const fN = {...fR, regional:filtros.regional};
  const optsNombre   = cols.nombre>=0 ? opcionesCascada(allRows,cols,df,fN,"nombre")  : [];
  const fFBase = {...fN, nombre:filtros.nombre};
  const optsAños   = opcionesCascada(allRows,cols,df,fFBase,"año");
  const fFY = {...fFBase, años:filtros.años};
  const optsMeses  = opcionesCascada(allRows,cols,df,fFY,"mes");
  const fFM = {...fFY, meses:filtros.meses};
  const optsDias   = opcionesCascada(allRows,cols,df,fFM,"fecha");

  let h = '<section class="filters">';
  if(tieneEmpresa && optsEmpresa.length)
    h += mkDropdown("fEmpresa","Empresa",optsEmpresa,filtros.empresa,optsEmpresa.length>6);
  if(tieneRegional && optsRegional.length)
    h += mkDropdown("fRegional","Regional",optsRegional,filtros.regional,optsRegional.length>6);
  if(optsNombre.length)
    h += mkDropdown("fNombre","Nombre",optsNombre,filtros.nombre,optsNombre.length>6);
  if(optsAños.length)
    h += mkDateDropdown(optsAños,optsMeses,optsDias);

  const hayFiltro=[...filtros.empresa,...filtros.regional,...filtros.nombre,...filtros.años,...filtros.meses,...filtros.fechas].length>0;
  if(hayFiltro) h += `<button class="btn-ghost" id="fClear" style="align-self:flex-end">Limpiar todo</button>`;
  return h + '</section>';
}

/* ---- Lógica de dropdowns simples ---- */
function toggleDrop(id){
  const btn=document.getElementById("btn_"+id);
  const panel=document.getElementById("panel_"+id);
  if(!btn||!panel) return;
  const opening = !panel.classList.contains("open");
  document.querySelectorAll(".filt-panel.open").forEach(p=>p.classList.remove("open"));
  document.querySelectorAll(".filt-btn.open").forEach(b=>b.classList.remove("open"));
  if(opening){ panel.classList.add("open"); btn.classList.add("open"); }
  else { applyDropChange(id, true); }
}
function toggleDateSec(hdr){
  hdr.classList.toggle("open");
  hdr.nextElementSibling.classList.toggle("open");
}
/* Cierra al hacer clic fuera */
document.addEventListener("click",e=>{
  if(!e.target.closest(".filt")){
    let hadOpen=false;
    document.querySelectorAll(".filt-panel.open").forEach(p=>{
      hadOpen=true;
      const pid=p.id.replace("panel_","");
      p.classList.remove("open");
      const pb=document.getElementById("btn_"+pid);
      if(pb) pb.classList.remove("open");
      if(pid!=="fDate") applyDropChange(pid, false);
    });
    if(hadOpen) render();
  }
});
function selectAll(id){
  const panel=document.getElementById("panel_"+id); if(!panel) return;
  panel.querySelectorAll("input[type=checkbox]").forEach(cb=>{cb.checked=true;cb.closest(".filt-option").classList.add("checked");});
  applyDropChange(id, true);
}
function clearFilt(id){
  if(id==="fDate"){ clearFiltDate(); return; }
  const panel=document.getElementById("panel_"+id); if(!panel) return;
  panel.querySelectorAll("input[type=checkbox]").forEach(cb=>{cb.checked=false;cb.closest(".filt-option").classList.remove("checked");});
  applyDropChange(id, true);
}
function applyDropChange(id, andRender){
  const panel=document.getElementById("panel_"+id); if(!panel) return;
  const vals=[...panel.querySelectorAll("input[type=checkbox]:checked")].map(cb=>cb.value);
  if(id==="fEmpresa")  { filtros.empresa=vals;  filtros.regional=[]; filtros.nombre=[]; filtros.años=[]; filtros.meses=[]; filtros.fechas=[]; }
  else if(id==="fRegional"){ filtros.regional=vals; filtros.nombre=[]; filtros.años=[]; filtros.meses=[]; filtros.fechas=[]; }
  else if(id==="fNombre")  { filtros.nombre=vals;   filtros.años=[]; filtros.meses=[]; filtros.fechas=[]; }
  if(andRender) render();
}
function applyOK(id){
  const panel=document.getElementById("panel_"+id);
  const btn=document.getElementById("btn_"+id);
  if(panel) panel.classList.remove("open");
  if(btn)   btn.classList.remove("open");
  if(id==="fDate") render();
  else applyDropChange(id, true);
}

function wireFiltros(allRows,cols,df,tieneEmpresa,tieneRegional){
  /* Checkboxes en dropdowns simples — solo actualiza estado, NO re-renderiza */
  ["fEmpresa","fRegional","fNombre"].forEach(id=>{
    const panel=document.getElementById("panel_"+id); if(!panel) return;
    panel.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      cb.onchange=()=>{
        cb.closest(".filt-option").classList.toggle("checked",cb.checked);
        applyDropChange(id, false);
      };
    });
    /* Búsqueda interna */
    const si=document.getElementById("search_"+id);
    if(si) si.oninput=()=>{
      const q=si.value.toLowerCase();
      panel.querySelectorAll(".filt-option").forEach(o=>{
        o.style.display=o.querySelector("span").textContent.toLowerCase().includes(q)?"":"none";
      });
    };
  });

  /* Árbol de fechas: evento delegado en el panel padre — nunca necesita re-conectarse */
  const pDate=document.getElementById("panel_fDate"); if(pDate){
    _dateCtx = {allRows, cols, df};
    pDate.addEventListener("change", e=>{
      const cb = e.target;
      if(cb.type !== "checkbox") return;
      cb.closest(".filt-option").classList.toggle("checked", cb.checked);
      const campo = cb.dataset.filt; /* "años", "meses" o "fechas" */
      const vals = [...pDate.querySelectorAll(`input[data-filt="${campo}"]:checked`)].map(x=>x.value);
      /* Actualiza filtros y refresca cascada en el panel */
      filtros[campo] = vals;
      if(campo==="años"){ filtros.meses=[]; filtros.fechas=[]; }
      else if(campo==="meses"){ filtros.fechas=[]; }
      refreshDateCascade();
    });
  }

  const gc=document.getElementById("fClear");
  if(gc) gc.onclick=()=>{ filtros={empresa:[],regional:[],nombre:[],años:[],meses:[],fechas:[]}; render(); };
}

/* ---------- Calificación General: estrellas + barra de respuestas (req. 7) ---------- */
function tarjetaEstrellas(r){
  const pct=Math.max(0,Math.min(100, r.prom/r.max*100));   // relleno proporcional al promedio
  const fila="★".repeat(r.max);
  return `<div class="cardc rating-card"><h3>¿Con cuántas estrellas calificarías tu experiencia en general?</h3>`
       +`<div class="sub">Promedio de experiencia general · ${r.total} respuesta(s)</div>`
       +`<div class="rc-body">`
         +`<div class="rc-left"><div class="stars"><span class="s-empty">${fila}</span><span class="s-full" style="width:${pct}%">${fila}</span></div>`
           +`<div class="rc-num">${r.prom.toFixed(1)}<small>/${r.max}</small></div></div>`
         +`<div class="rc-right"><div class="chartbox" style="height:150px"><canvas id="c_rt"></canvas></div></div>`
       +`</div></div>`;
}

/* Renderiza una pregunta likert con el mismo formato visual — conservado exactamente */
function afilRow(L){
  const E=ESCALAS[L.escala];
  const r=Math.max(1,Math.min(5,Math.round(L.score)));
  const emo=E.emocional?(E.emojis[5-r]||""):"";
  const colBadge=L.score>=4?"var(--good)":L.score>=3?"var(--accent)":"var(--warn)";
  let seg=""; E.orden.forEach((lbl,idx)=>{ const c=L.conteo[lbl]||0, pc=L.total?c/L.total*100:0;
    if(pc>0) seg+=`<span class="seg" style="width:${pc}%;background:${COL_ESCALA[idx]}" title="${esc(lbl)}: ${c} (${Math.round(pc)}%)"></span>`; });
  let leg=""; E.orden.forEach((lbl,idx)=>{ const c=L.conteo[lbl]||0; if(!c) return;
    leg+=`<span class="lg"><i style="background:${COL_ESCALA[idx]}"></i>${E.emocional?E.emojis[idx]+" ":""}${esc(lbl)} <b>${c}</b></span>`; });
  return `<div class="afil"><div class="afil-top">`
      +`<div class="afil-q">${emo?`<span class="emo">${emo}</span>`:""}${esc(L.header)}</div>`
      +`<div class="afil-m"><span class="badge" style="background:${colBadge}">${L.score.toFixed(1)}/5</span>`
        +`<span class="pos">${L.pct}% positivo</span><span class="cant">${L.total} resp.</span></div></div>`
    +`<div class="sbar">${seg}</div><div class="slegend">${leg}</div></div>`;
}

/* =====================================================================
   ANÁLISIS CON DIMENSIONES (posición de columnas)
   Extiende analizar() añadiendo la asignación de cada pregunta likert
   a su dimensión según el rango de columna real (0-based, inclusive).
   Las 5 dimensiones tienen 4 preguntas cada una = 20 preguntas totales.
   ===================================================================== */
const NOMBRES_DIMS = [
  { nombre:"Proceso de Selección",                icon:"🔍", color:"#3d6fb0" },
  { nombre:"Bienvenida e Ingreso",                icon:"🤝", color:"#0e87bf" },
  { nombre:"Inducción y Compromiso del Propósito",icon:"🎯", color:"#15795f" },
  { nombre:"Capacitación y Claridad del Rol",     icon:"📚", color:"#9c5c8f" },
  { nombre:"Recibimiento del Equipo y Liderazgo", icon:"👥", color:"#e8621e" },
];

function analizarConDimensiones(d, rangos){
  /* Primero hacemos el análisis normal para obtener todos los likerts,
     rating, evento, etc. */
  const A = analizar(d);

  /* Asignar cada likert a su dimensión por índice de columna real */
  const H = d.headers;
  const colIdx = {};
  H.forEach((h,i) => { colIdx[h] = i; });   // header → column index

  /* Para cada likert encontramos su columna en los headers */
  const dims = NOMBRES_DIMS.map((meta, di) => ({
    ...meta,
    items: [],
    rango: rangos[di]
  }));
  const sinDim = [];

  A.likerts.forEach(L => {
    const ci = colIdx[L.header];   // índice de columna real (0-based)
    let asignado = false;
    for(let di=0; di<dims.length; di++){
      const [lo, hi] = dims[di].rango;
      if(ci >= lo && ci <= hi){ dims[di].items.push(L); asignado=true; break; }
    }
    if(!asignado) sinDim.push(L);
  });

  /* Recalcular satGeneral usando TODAS las preguntas (incluyendo emocionales)
     ya que analizar() ya lo hace con todos los likerts. */
  return { ...A, dimensiones: dims, sinDim };
}

/* =====================================================================
   PANEL POR DIMENSIONES CON TABS
   ===================================================================== */
function panelPorDimensiones(dims){
  if(!dims || !dims.every(d=>d.items!==undefined)) return "";
  const activas = dims.filter(d=>d.items.length>0);
  if(!activas.length) return "";

  /* Asegura que dimTab apunte a una dimensión con datos */
  const validIdx = activas.findIndex((_, i) => {
    const globalIdx = dims.indexOf(activas[i]);
    return globalIdx === dimTab;
  });
  if(validIdx < 0) dimTab = dims.indexOf(activas[0]);

  /* Score medio de una dimensión */
  const secScore = items => items.length
    ? (items.reduce((a,L)=>a+L.score,0)/items.length).toFixed(1)
    : null;

  let h = '<div class="section-t">Satisfacción por Dimensión</div>';

  /* Tabs de dimensión */
  h += '<div class="dim-tabs">';
  dims.forEach((dim, di) => {
    if(!dim.items.length) return;
    const active = di === dimTab ? " active" : "";
    h += `<button class="dim-tab${active}" data-dim="${di}">`
       + `<span class="dim-icon">${dim.icon}</span>${dim.nombre}</button>`;
  });
  h += '</div>';

  /* Contenido de la dimensión activa */
  const activaDim = dims[dimTab] || activas[0];
  if(activaDim && activaDim.items.length){
    const sc = secScore(activaDim.items);
    const colBadge = +sc>=4?"var(--good)":+sc>=3?"var(--accent)":"var(--warn)";
    h += `<div class="sec-bloque">`
       + `<div class="sec-hdr" style="background:${activaDim.color}">`
         + `<span class="sec-icon">${activaDim.icon}</span>`
         + `<span class="sec-nombre">${activaDim.nombre}</span>`
         + `<span class="sec-score" style="background:${colBadge}">${sc}/5</span>`
       + `</div>`
       + `<div class="sec-preguntas">`
       + activaDim.items.map(L=>afilRow(L)).join("")
       + `</div></div>`;
  }

  return h;
}

function wireDimTabs(dims){
  document.querySelectorAll(".dim-tab").forEach(btn => {
    btn.onclick = () => {
      dimTab = +btn.dataset.dim;
      document.querySelectorAll(".dim-tab").forEach(b => b.classList.toggle("active", +b.dataset.dim===dimTab));
      /* Re-renderizar solo el bloque de dimensión */
      const wrap = document.querySelector(".sec-bloque");
      if(!wrap) return;
      const activaDim = dims[dimTab];
      if(!activaDim || !activaDim.items.length){ wrap.innerHTML=""; return; }
      const secScore = items => items.length
        ? (items.reduce((a,L)=>a+L.score,0)/items.length).toFixed(1) : null;
      const sc = secScore(activaDim.items);
      const colBadge = +sc>=4?"var(--good)":+sc>=3?"var(--accent)":"var(--warn)";
      wrap.innerHTML = `<div class="sec-hdr" style="background:${activaDim.color}">`
          + `<span class="sec-icon">${activaDim.icon}</span>`
          + `<span class="sec-nombre">${activaDim.nombre}</span>`
          + `<span class="sec-score" style="background:${colBadge}">${sc}/5</span>`
          + `</div>`
          + `<div class="sec-preguntas">`
          + activaDim.items.map(L=>afilRow(L)).join("")
          + `</div>`;
    };
  });
}

/* ---------- Voz del Colaborador (req. 3) ---------- */
function registrosVoz(rows,cols,colC){
  const vacio=v=>{const t=norm(v);return !t||t==="."||t==="ninguna"||t==="ninguno"||t==="na"||t==="n"||t==="n a"||t==="nada"||t==="ninguno por ahora"||t==="no aplica";};
  const out=[];
  rows.forEach(r=>{ const txt=(r[colC]||"").trim(); if(vacio(txt)) return;
    const nombre=cols.nombre>=0?(r[cols.nombre]||"").trim():"";
    const cargo =cols.cargo>=0?(r[cols.cargo]||"").trim():"";
    let areaSuc =cols.area>=0?(r[cols.area]||"").trim():"";       // área o, en su defecto, sucursal
    if(!areaSuc && cols.sucursal>=0) areaSuc=(r[cols.sucursal]||"").trim();
    out.push({nombre,cargo,areaSuc,txt}); });
  return out;
}
function vcard(rec,cls){
  const meta=[rec.cargo,rec.areaSuc].filter(Boolean).map(esc).join('<span class="dot">·</span>');
  const s=norm(`${rec.nombre} ${rec.cargo} ${rec.areaSuc} ${rec.txt}`);   // texto buscable
  return `<div class="vcard${cls?" "+cls:""}" data-s="${esc(s)}"><div class="vc-head"><span class="vc-name">${esc(rec.nombre||"Anónimo")}</span>`
       +(meta?`<span class="vc-meta">${meta}</span>`:"")+`</div><p class="vc-txt">${esc(rec.txt)}</p></div>`;
}
function seccionVoz(rows,cols){
  if(cols.fortalezas<0 && cols.mejoras<0 && cols.capacitacion<0) return "";
  const fort=cols.fortalezas>=0?registrosVoz(rows,cols,cols.fortalezas):[];
  const mej =cols.mejoras>=0?registrosVoz(rows,cols,cols.mejoras):[];
  const cap =cols.capacitacion>=0?registrosVoz(rows,cols,cols.capacitacion):[];
  const panel=(arr,id,on,cls)=>`<div class="vpanel${on?" on":""}" id="${id}">`
      +(arr.length?'<div class="vcards">'+arr.map(r=>vcard(r,cls)).join("")+'</div>':'<div class="sub vempty">Sin comentarios.</div>')+`</div>`;
  const ico='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
  let tabs='';
  tabs+=`<button class="vtab${vozTab===0?" active":""}" data-t="0">Fortalezas <span class="vn">${fort.length}</span></button>`;
  tabs+=`<button class="vtab${vozTab===1?" active":""}" data-t="1">Oportunidades de mejora <span class="vn">${mej.length}</span></button>`;
  if(cols.capacitacion>=0)
    tabs+=`<button class="vtab${vozTab===2?" active":""}" data-t="2">Solicitudes de Capacitación <span class="vn">${cap.length}</span></button>`;
  return '<div class="section-t">Voz del Colaborador</div>'
       +'<div class="cardc full voz"><h3>Voz del Colaborador</h3>'
       +'<div class="sub">Comentarios abiertos sobre fortalezas, oportunidades de mejora y solicitudes de capacitación.</div>'
       +'<div class="vbar"><div class="vtabs">'+tabs+'</div>'
       +`<label class="search voz-search">${ico}<input id="vozSearch" type="text" placeholder="Buscar por palabra clave…" value="${esc(vozQuery)}"/></label>`
       +'</div>'
       +panel(fort,"vpanel0",vozTab===0,"")
       +panel(mej,"vpanel1",vozTab===1,"mej")
       +(cols.capacitacion>=0?panel(cap,"vpanel2",vozTab===2,"mej"):"")
       +'</div>';
}
function wireVoz(){
  document.querySelectorAll(".vtab").forEach(t=>t.onclick=()=>{
    vozTab=+t.dataset.t;
    document.querySelectorAll(".vtab").forEach(x=>x.classList.toggle("active",+x.dataset.t===vozTab));
    ["vpanel0","vpanel1","vpanel2"].forEach((id,i)=>{const p=document.getElementById(id); if(p) p.classList.toggle("on",vozTab===i);});
    filtrarVoz();
  });
  const s=document.getElementById("vozSearch");
  if(s) s.oninput=()=>{vozQuery=s.value; filtrarVoz();};
  filtrarVoz();
}
function filtrarVoz(){
  const q=norm(vozQuery);
  ["vpanel0","vpanel1","vpanel2"].forEach(id=>{
    const p=document.getElementById(id); if(!p) return;
    let vis=0;
    p.querySelectorAll(".vcard").forEach(c=>{ const ok=!q||c.dataset.s.includes(q); c.style.display=ok?"":"none"; if(ok)vis++; });
    let none=p.querySelector(".vnone");
    if(p.classList.contains("on")&&q&&vis===0){ if(!none){none=document.createElement("div");none.className="sub vnone";none.textContent="Sin coincidencias para esa palabra.";p.appendChild(none);} }
    else if(none) none.remove();
  });
}

/* ---------- Tabla en bruto (compartida onboarding/salida) ---------- */
function toolbarTabla(){
  let h='<div class="toolbar"><button class="btn-ghost" id="toggleTabla">'
      +(tablaVisible?"Ocultar datos en bruto":"Ver datos en bruto")+'</button>';
  if(tablaVisible)
    h+='<label class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>'
      +'<input id="search" type="text" placeholder="Buscar…"/></label><span class="count" id="count"></span>';
  return h+'</div><div id="tablaWrap"></div>';
}
function wireTabla(){
  const tg=document.getElementById("toggleTabla");
  if(tg) tg.onclick=()=>{tablaVisible=!tablaVisible;render();};
  if(tablaVisible){ document.getElementById("search").addEventListener("input",pintarTabla); pintarTabla(); }
}

/* ---------- Tabla (pinta los datos YA filtrados) ---------- */
function pintarTabla(){
  const d=datosVista||datos[hojaActiva], wrap=document.getElementById("tablaWrap");
  const q=(document.getElementById("search").value||"").trim().toLowerCase();
  const filas=q?d.rows.filter(r=>r.some(c=>(c||"").toLowerCase().includes(q))):d.rows;
  document.getElementById("count").textContent=q?`Mostrando ${filas.length} de ${d.rows.length}`:`${d.rows.length} registros`;
  let h='<div class="tablebox"><table><thead><tr>';
  d.headers.forEach(x=>h+=`<th>${esc(x)}</th>`);
  h+="</tr></thead><tbody>";
  if(!filas.length) h+=`<tr><td colspan="${d.headers.length}" style="text-align:center;padding:30px;color:var(--ink-soft)">Sin resultados</td></tr>`;
  else filas.forEach(r=>{h+="<tr>";d.headers.forEach((_,c)=>{const v=r[c]||"";h+=`<td title="${esc(v)}">${esc(v)}</td>`;});h+="</tr>";});
  h+="</tbody></table></div>";
  wrap.innerHTML=h;
}

/* ---------- Arranque ---------- */
function arrancar(){
  document.getElementById("btnSync").onclick=sincronizar;
  renderTabs(); sincronizar();
}
initGate();
